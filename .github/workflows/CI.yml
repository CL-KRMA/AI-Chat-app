name: CI/CD Pipeline

on:
  push:
    branches: [ "main" ]

env:
  IMAGE_NAME: ghcr.io/${{ secrets.GHCR_USERNAME }}/ai-chat-app

jobs:
  # 1. Lint (qualité du code)
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: ./AI-Chat/package-lock.json

      - name: Install dependencies
        run: npm ci
        working-directory: ./AI-Chat

      - name: Run ESLint
        run: npm run lint
        working-directory: ./AI-Chat

  # 2. Tests unitaires
  tests:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: ./AI-Chat/package-lock.json

      - name: Install dependencies
        run: npm ci
        working-directory: ./AI-Chat

      - name: Run Jest tests
        run: npm test
        working-directory: ./AI-Chat

      - name: Audit dependencies
        run: npm audit --audit-level=high
        working-directory: ./AI-Chat
        continue-on-error: true

  # 3. Build & Push image (seulement si lint + tests passent)
  build:
    runs-on: ubuntu-latest
    needs: [lint, tests]
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ secrets.GHCR_USERNAME }}
          password: ${{ secrets.GHCR_TOKEN }}

      - name: Build and push Docker image
        uses: docker/build-push-action@v5
        with:
          context: ./AI-Chat
          push: true
          no-cache: true
          tags: |
            ${{ env.IMAGE_NAME }}:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  # 4. Security Scan (bloquant sur CRITICAL/HIGH)
  security:
    runs-on: ubuntu-latest
    needs: build
    permissions:
      contents: read
      packages: write
    steps:
      - name: Scan Docker image with Trivy
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: ${{ env.IMAGE_NAME }}:${{ github.sha }}
          format: 'table'
          severity: 'CRITICAL,HIGH'
          exit-code: '1'
          ignore-unfixed: true

      - name: Log in to GitHub Container Registry
        if: success()
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ secrets.GHCR_USERNAME }}
          password: ${{ secrets.GHCR_TOKEN }}

      # Promote latest uniquement si le scan passe
      - name: Promote image to latest
        if: success()
        run: |
          docker pull ${{ env.IMAGE_NAME }}:${{ github.sha }}
          docker tag ${{ env.IMAGE_NAME }}:${{ github.sha }} ${{ env.IMAGE_NAME }}:latest
          docker push ${{ env.IMAGE_NAME }}:latest

  # 5. Mise à jour du repo infra (GitOps) — uniquement si scan OK
  update-infra:
    runs-on: ubuntu-latest
    needs: security
    steps:
      - uses: actions/checkout@v4
        with:
          repository: CL-KRMA/AI-Chat-gitops
          ref: main
          token: ${{ secrets.INFRA_REPO_TOKEN }}

      - name: Mettre à jour le manifest avec le nouveau tag
        run: |
          sed -i "s|${{ env.IMAGE_NAME }}:.*|${{ env.IMAGE_NAME }}:${{ github.sha }}|g" frontend.yaml

      - name: Commit et push
        run: |
          git config user.name "github-actions"
          git config user.email "actions@github.com"
          git add frontend.yaml
          git commit -m "chore: update ai-chat-app image to ${{ github.sha }}" || echo "No changes to commit"
          git push origin main
