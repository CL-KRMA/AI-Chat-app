name: CI/CD Pipeline

on:
  push:
    branches: [ "main" ]

jobs:
  # 1. Lint (qualité du code)
  lint:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v3
      - uses: actions/setup-node@v3
        with:
          node-version: '20'
      - name: Install dependencies
        run: npm ci
        working-directory: ./ai-chat
      - name: Run ESLint
        run: npm run lint
        working-directory: ./ai-chat

  # 2. Tests unitaires hors conteneur
  tests:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v3
      - uses: actions/setup-node@v3
        with:
          node-version: '20'
      - name: Install dependencies
        run: npm ci
        working-directory: ./ai-chat
      - name: Run Jest tests
        run: npm test
        working-directory: ./ai-chat

  # 3. Build & Push image (seulement si lint + tests passent)
  build:        
    runs-on: ubuntu-latest
    needs: [lint, tests]   # dépend des deux jobs en parallèle
    steps:
      - name: Checkout code
        uses: actions/checkout@v3
      - name: Log in to GitHub Container Registry
        run: echo "${{ secrets.GHCR_TOKEN }}" | docker login ghcr.io -u ${{ secrets.GHCR_USERNAME }} --password-stdin
      - name: Build and push Docker image
        uses: docker/build-push-action@v5
        with:
          context: ./AI-Chat
          push: true
          tags: |
            ghcr.io/${{ secrets.GHCR_USERNAME }}/ai-chat-app:${{ github.sha }}
            ghcr.io/${{ secrets.GHCR_USERNAME }}/ai-chat-app:latest

  # 4. Security Scan
  security:
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Scan Docker image with Trivy
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: ghcr.io/${{ secrets.GHCR_USERNAME }}/ai-chat-app:${{ github.sha }}
          format: 'table'
          exit-code: '0'
          ignore-unfixed: true

  # 5. Mise à jour du repo infra (GitOps)
  update-infra:
    runs-on: ubuntu-latest
    needs: security
    steps:
      - name: Checkout infra repo
        uses: actions/checkout@v3
        with:
          repository: CL-KRMA/AI-Chat-gitops
          ref: main
          token: ${{ secrets.INFRA_REPO_TOKEN }}

      - name: Mettre à jour le manifest avec le nouveau tag
        run: |
          sed -i "s|ghcr.io.*/ai-chat-app:.*|ghcr.io/${{ secrets.GHCR_USERNAME }}/ai-chat-app:${{ github.sha }}|g" frontend.yaml

      - name: Commit et push
        run: |
          git config user.name "github-actions"
          git config user.email "actions@github.com"
          git add frontend.yaml
          git commit -m "Update ai-chat-app image to ${{ github.sha }}" || echo "No changes to commit"
          git push origin main
